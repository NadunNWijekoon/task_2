<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid and Flexbox Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Grid and Flexbox Representation</h1>

    <section>
        <h2>CSS Grid Layout</h2>

        <div class="grid-container">
            <div class="grid-box box1">Box 1</div>
            <div class="grid-box box2">Box 2</div>
            <div class="grid-box box3">Box 3</div>
            <div class="grid-box box4">Box 4</div>
            <div class="grid-box box5">Box 5</div>
            <div class="grid-box box6">Box 6</div>
        </div>
    </section>

    
    <section>
        <h2>Flexbox Layout</h2>

        <div class="flex-container">
            <div class="flex-box circle">Circle</div>
            <div class="flex-box rounded">Rounded</div>
            <div class="flex-box square">Square</div>
            <div class="flex-box rectangle">Rectangle</div>
        </div>
    </section>

   

</body>
</html>
